<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashbord - SmartHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashbord-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>SmartHub</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item ativo">Meus Clientes</a>
        </nav>

        <div class="sidebar-footer">
            <button id="btn-sair" classe="btn-secundario">Sair</button>
        </div>
    </aside>

    <main class="conteudo-principal">
        <header class="header-deshbord">
            <h1>Gestão de Clientes</h1>
        </header>

        <section class="area-trabalho">
            <div class="card-vazio">
                <p>Nenhum cliente cadastrado ainda</p>
                <button class="btn-principal">Adicionar Cliente</button>
            </div>
        </section>
    </main>
    
    <script src="JS/dashbord.js"></script>
</body>
</html>
