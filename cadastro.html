<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHub - Cadastro</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-login">
        <div class="card-login">
            <h2>Crie sua conta</h2>
            <p>Comece a gerenciar seus clientes hoje.</p>

            <form id="form-cadastro">
                <div class="grupo-input">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome" required>
                </div>

                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="grupo-input">
                    <label for="confirma-senha">Confirme a Senha</label>
                    <input type="password" id="confirma-senha" placeholder="Digite a senha novamente" required>
                    <small id="erro-cadastro" class="mensagem-erro"></small>
                </div>

                <button type="submit" class="btn-principal">Cadastrar</button>
            </form>

            <p class="link-cadastro">
                Já tem uma conta? <a href="index.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="js/register.js"></script>
</body>
</html>
