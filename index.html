<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container-login">
        <div class="card-login">
            <h2>Bem vindo ao SmartHub</h2>
            <p>Gerencie seus clientes com eficiência e inteligência.</p>

            <form id="form-login">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="grupo-input">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="Digite sua senha" required>
                    <small id="erro-senha" class="mensagem-erro"></small>
                </div>

                <button type="submit" class="btn-principal">Entrar</button>

            </form>

             <p class="link-cadastro">
                Já tem uma conta? <a href="cadastro.html">Faça login</a>
            </p>
        </div>
    </div>

    <script src="JS/script.js"></script>

</body>
</html>
